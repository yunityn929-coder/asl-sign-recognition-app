name: hiasl
description: HiASL — Beginner ASL learning app with on-device gesture recognition.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Camera & Gesture Recognition
  camera: ^0.11.0
  google_mlkit_commons: ^0.9.0
  tflite_flutter: ^0.12.0

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.0.0

  # Authentication
  google_sign_in: ^6.2.1

  # Audio
  flutter_tts: ^4.0.2
  audioplayers: ^6.0.0

  # Notifications
  flutter_local_notifications: ^17.0.0
  permission_handler: ^11.3.0
  timezone: ^0.9.4

  # Navigation & State
  go_router: ^14.0.0
  flutter_riverpod: ^2.5.1

  # Testing / diagnostics (debug-only screen, not user-facing)
  path_provider: ^2.1.0

  # Native splash screen handoff
  flutter_native_splash: ^2.4.7
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/models/3d/
    - assets/audio/
    - assets/images/
    - assets/images/hand_sign/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "assets/icon/app_icon_background.png"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#FFFFFF"
  android_12:
    color: "#FFFFFF"
    color_dark: "#FFFFFF"
